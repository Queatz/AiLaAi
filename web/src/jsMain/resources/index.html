<!DOCTYPE html>
<html lang="en,vi">
<meta name="viewport" content="width=device-width, initial-scale=0.75, minimum-scale=0.75, maximum-scale=0.75">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ysabeau+Infant:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Estonia:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0..1,0" />
<link rel="icon" type="image/x-png" href="/icon.png">
<head>
<script>
    (function() {
        const handler = {
            get(target, prop) {
                if (prop === 'prototype') return {};
                if (prop === 'then') return undefined;
                return new Proxy(function() {}, {
                    get(t, p) {
                        if (p === 'prototype') return {};
                        if (p === Symbol.hasInstance) {
                            return function(instance) {
                                const real = window.BABYLON_REAL && window.BABYLON_REAL[prop];
                                return real && (instance instanceof real);
                            };
                        }
                        const real = window.BABYLON_REAL && window.BABYLON_REAL[prop];
                        return real ? real[p] : undefined;
                    },
                    apply(t, thisArg, args) {
                        const real = window.BABYLON_REAL && window.BABYLON_REAL[prop];
                        if (real) return real.apply(thisArg, args);
                        throw new Error("BABYLON." + prop + " called before it was loaded. Ensure you are in GamePage.");
                    },
                    construct(t, args) {
                        const real = window.BABYLON_REAL && window.BABYLON_REAL[prop];
                        if (real) return new real(...args);
                        throw new Error("BABYLON." + prop + " instantiated before it was loaded.");
                    }
                });
            }
        };
        window.BABYLON = new Proxy({}, handler);
    })();
</script>
<style>
html, body {
    width: 100vw;
    min-height: 100vh;
    margin: 0;
    font-family: 'Ysabeau Infant', sans-serif;
    background: #ffffff;
}

@media (prefers-color-scheme: dark) {
    html, body {
        background: #000;
        color: #fff;
    }
}

button, textarea {
    font-family: inherit;
}
</style>
